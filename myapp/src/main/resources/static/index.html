<!DOCTYPE html>
<html lang="en">

<head>
    <script src="auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renuka Devi Cold Storage</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar">
        <h1>Renuka Devi Cold Storage</h1>
        <nav>
            <a href="/" class="active">Dashboard</a>
            <a href="/kisan.html">Kisan</a>
            <a href="/storage.html">Storage Entries</a>
            <a href="/staff.html">Staff</a>
            <a href="/accounts.html">Accounts</a>
        </nav>
    </header>

    <main>
        <section class="stats">
            <div class="card">
                <p class="label">Total Kisan</p>
                <p class="value" id="total-kisan">...</p>
            </div>
            <div class="card">
                <p class="label">Bags in Storage</p>
                <p class="value" id="total-bags">...</p>
            </div>
            <div class="card">
                <p class="label">Capacity Used</p>
                <p class="value">76%</p>
            </div>
            <div class="card">
                <p class="label">Staff Members</p>
                <p class="value">9</p>
            </div>
        </section>

        <section class="recent">
            <h2>Recent Entries</h2>
            <table>
                <thead>
                    <tr>
                        <th>Kisan</th>
                        <th>Date In</th>
                        <th>Bags</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recent-entries">
                </tbody>
            </table>
        </section>
    </main>
    <script>
        async function loadStats() {
            const kisanResponse = await fetch('/api/kisan');
            const kisanList = await kisanResponse.json();
            document.getElementById('total-kisan').textContent = kisanList.length;

            const storageResponse = await fetch('/api/storage/status/IN');
            const storageList = await storageResponse.json();

            let totalBags = 0;
            storageList.forEach(entry => {
                totalBags += entry.bags;
            });
            document.getElementById('total-bags').textContent = totalBags.toLocaleString();
        }

        async function loadRecentEntries() {
            const response = await fetch('/api/storage');
            const entries = await response.json();

            const tbody = document.getElementById('recent-entries');
            tbody.innerHTML = '';

            const recent = entries.slice(-5).reverse();

            recent.forEach(entry => {
                tbody.innerHTML += `
                <tr>
                    <td>${entry.kisanName}</td>
                    <td>${entry.dateIn}</td>
                    <td>${entry.bags}</td>
                    <td>
                        <span style="
                            padding: 3px 10px;
                            border-radius: 20px;
                            font-size: 12px;
                            background-color: ${entry.status === 'IN' ? 'rgba(52,211,153,0.15)' : 'rgba(248,113,113,0.15)'};
                            color: ${entry.status === 'IN' ? '#34d399' : '#f87171'};
                        ">${entry.status}</span>
                    </td>
                </tr>
            `;
            });
        }

        loadStats();
        loadRecentEntries();
    </script>
</body>

</html>
