<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renuka Devi Cold Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <h1>Renuka Devi Cold Storage</h1>
        <nav>
            <a href="#" class="active">Dashboard</a>
            <a href="#">Kisan</a>
            <a href="#">Storage Entries</a>
            <a href="#">Staff</a>
            <a href="#">Accounts</a>
        </nav>
    </header>

    <main>
        <section class="stats">
            <div class="card">
                <p class="label">Total Kisan</p>
                <p class="value" id="total-kisan">...</p>
            </div>
            <div class="card">
                <p class="label">Bags in Storage</p>
                <p class="value">4,560</p>
            </div>
            <div class="card">
                <p class="label">Capacity Used</p>
                <p class="value">76%</p>
            </div>
            <div class="card">
                <p class="label">Staff Members</p>
                <p class="value">9</p>
            </div>
        </section>

        <section class="recent">
            <h2>Recent Entries</h2>
            <table>
                <thead>
                    <tr>
                        <th>Kisan</th>
                        <th>Village</th>
                        <th>Bags</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Ramesh Singh</td>
                        <td>Samsabad</td>
                        <td>120</td>
                        <td>12 Jun</td>
                    </tr>
                    <tr>
                        <td>Suresh Yadav</td>
                        <td>Fatehabad</td>
                        <td>85</td>
                        <td>11 Jun</td>
                    </tr>
                    <tr>
                        <td>Mahesh Kumar</td>
                        <td>Etmadpur</td>
                        <td>200</td>
                        <td>10 Jun</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <script>
    async function loadStats() {
        const response = await fetch('/api/kisan');
        const kisanList = await response.json();

        document.getElementById('total-kisan').textContent = kisanList.length;
    }

    loadStats();
</script>
</body>
</html>
