<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff | Renuka Devi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-box {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .form-box h2 { margin-bottom: 20px; font-size: 18px; }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-row input, .form-row select {
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-row input:focus, .form-row select:focus { border-color: #c084fc; }
        .form-row input::placeholder { color: #8b949e; }
        .form-row select option { background-color: #161b22; }
        .btn-add {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.85; }
        .staff-table {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 14px;
            padding: 24px;
        }
        .staff-table h2 { margin-bottom: 20px; font-size: 18px; }
        .role-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .role-badge.manager { background-color: rgba(129,140,248,0.15); color: #818cf8; }
        .role-badge.worker { background-color: rgba(251,191,36,0.15); color: #fbbf24; }
        .btn-delete {
            background-color: transparent;
            color: #f87171;
            border: 1px solid #f87171;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }
        .btn-delete:hover { background-color: #f87171; color: white; }
        .checkout-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .checkout-modal.show { display: flex; }
        .modal-box {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 14px;
            padding: 30px;
            width: 400px;
        }
        .modal-box h3 { margin-bottom: 20px; }
        .modal-box input {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 6px; }
        .btn-confirm {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }
        .btn-cancel {
            background-color: #21262d;
            color: #e6edf3;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <h1>Renuka Devi Cold Storage</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/kisan.html">Kisan</a>
            <a href="/storage.html">Storage Entries</a>
            <a href="/staff.html" class="active">Staff</a>
            <a href="#">Accounts</a>
        </nav>
    </header>

    <main>
        <div class="form-box">
            <h2>Naya Staff Add Karo</h2>
            <div class="form-row">
                <input type="text" id="name" placeholder="Naam">
                <select id="role">
                    <option value="">Role select karo</option>
                    <option value="Manager">Manager</option>
                    <option value="Worker">Worker</option>
                </select>
                <input type="number" id="monthlySalary" placeholder="Monthly Salary (₹)">
            </div>
            <button class="btn-add" onclick="addStaff()">Staff Add Karo</button>
        </div>

        <div class="staff-table">
            <h2>Saare Staff</h2>
            <table>
                <thead>
                    <tr>
                        <th>Naam</th>
                        <th>Role</th>
                        <th>Monthly Salary</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="staff-list"></tbody>
            </table>
        </div>
    </main>

    <div class="checkout-modal" id="paymentModal">
        <div class="modal-box">
            <h3>Payment Karo</h3>
            <input type="number" id="payAmount" placeholder="Amount (₹)">
            <input type="date" id="payDate">
            <input type="text" id="payNote" placeholder="Note (jaise Advance, Full Salary)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closePaymentModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmPayment()">Payment Karo</button>
            </div>
        </div>
    </div>

    <script>
        let currentStaffId = null;
        let currentStaffName = null;

        async function loadStaff() {
            const response = await fetch('/api/staff');
            const staffList = await response.json();
            const tbody = document.getElementById('staff-list');
            tbody.innerHTML = '';

            for (const staff of staffList) {
                const payRes = await fetch(`/api/payment/staff/${staff.id}`);
                const payments = await payRes.json();

                let totalPaid = 0;
                payments.forEach(p => totalPaid += p.amount);

                let historyHTML = payments.length === 0
                    ? '<p style="color:#8b949e; font-size:13px;">Koi payment nahi</p>'
                    : payments.map(p => `
                        <div style="display:flex; justify-content:space-between; padding: 6px 0; border-bottom: 1px solid #21262d; font-size:13px;">
                            <span>${p.date} — ${p.note}</span>
                            <span style="color:#34d399;">₹${p.amount.toLocaleString()}</span>
                        </div>
                    `).join('');

                tbody.innerHTML += `
                    <tr onclick="toggleHistory('${staff.id}')" style="cursor:pointer;">
                        <td>${staff.name}</td>
                        <td>
                            <span class="role-badge ${staff.role === 'Manager' ? 'manager' : 'worker'}">
                                ${staff.role}
                            </span>
                        </td>
                        <td>₹${staff.monthlySalary.toLocaleString()}</td>
                        <td>
                            <button class="btn-add" style="padding: 5px 12px; font-size: 12px;" onclick="event.stopPropagation(); openPaymentModal('${staff.id}', '${staff.name}')">
                                Payment
                            </button>
                            <button class="btn-delete" onclick="event.stopPropagation(); deleteStaff('${staff.id}')">
                                Delete
                            </button>
                        </td>
                    </tr>
                    <tr id="history-${staff.id}" style="display:none;">
                        <td colspan="4">
                            <div style="padding: 10px; background: #0d1117; border-radius: 8px; margin: 4px 0;">
                                <p style="font-size:13px; color:#8b949e; margin-bottom:8px;">
                                    Total Paid: <span style="color:#c084fc;">₹${totalPaid.toLocaleString()}</span> | 
                                    Baaki: <span style="color:#f87171;">₹${(staff.monthlySalary - totalPaid).toLocaleString()}</span>
                                </p>
                                ${historyHTML}
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        function toggleHistory(staffId) {
            const row = document.getElementById(`history-${staffId}`);
            row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
        }

        function openPaymentModal(id, name) {
            currentStaffId = id;
            currentStaffName = name;
            document.getElementById('paymentModal').classList.add('show');
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('show');
        }

        async function confirmPayment() {
            const amount = document.getElementById('payAmount').value;
            const date = document.getElementById('payDate').value;
            const note = document.getElementById('payNote').value;

            if (!amount || !date) {
                alert('Amount aur date zaroori hai!');
                return;
            }

            await fetch('/api/payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    staffId: currentStaffId,
                    staffName: currentStaffName,
                    amount, date, note
                })
            });

            document.getElementById('payAmount').value = '';
            document.getElementById('payDate').value = '';
            document.getElementById('payNote').value = '';

            closePaymentModal();
            loadStaff();
        }

        async function addStaff() {
            const name = document.getElementById('name').value;
            const role = document.getElementById('role').value;
            const monthlySalary = document.getElementById('monthlySalary').value;

            if (!name || !role || !monthlySalary) {
                alert('Saari fields bharo!');
                return;
            }

            await fetch('/api/staff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, role, monthlySalary })
            });

            document.getElementById('name').value = '';
            document.getElementById('role').value = '';
            document.getElementById('monthlySalary').value = '';

            loadStaff();
        }

        async function deleteStaff(id) {
            if (confirm('Kya aap sure hain?')) {
                await fetch(`/api/staff/${id}`, { method: 'DELETE' });
                loadStaff();
            }
        }

        loadStaff();
    </script>
</body>
</html>
