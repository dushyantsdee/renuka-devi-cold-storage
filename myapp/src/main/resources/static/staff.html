<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff | Renuka Devi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-box {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .form-box h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row input,
        .form-row select {
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-row input:focus,
        .form-row select:focus {
            border-color: #c084fc;
        }

        .form-row input::placeholder {
            color: #8b949e;
        }

        .form-row select option {
            background-color: #161b22;
        }

        .btn-add {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-add:hover { opacity: 0.85; }

        .staff-table {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 14px;
            padding: 24px;
        }

        .staff-table h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .role-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-badge.manager {
            background-color: rgba(129, 140, 248, 0.15);
            color: #818cf8;
        }

        .role-badge.worker {
            background-color: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .btn-delete {
            background-color: transparent;
            color: #f87171;
            border: 1px solid #f87171;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: #f87171;
            color: white;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <h1>Renuka Devi Cold Storage</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/kisan.html">Kisan</a>
            <a href="/storage.html">Storage Entries</a>
            <a href="/staff.html" class="active">Staff</a>
            <a href="#">Accounts</a>
        </nav>
    </header>

    <main>
        <div class="form-box">
            <h2>Naya Staff Add Karo</h2>
            <div class="form-row">
                <input type="text" id="name" placeholder="Naam">
                <select id="role">
                    <option value="">Role select karo</option>
                    <option value="Manager">Manager</option>
                    <option value="Worker">Worker</option>
                </select>
                <input type="number" id="monthlySalary" placeholder="Monthly Salary (₹)">
            </div>
            <button class="btn-add" onclick="addStaff()">Staff Add Karo</button>
        </div>

        <div class="staff-table">
            <h2>Saare Staff</h2>
            <table>
                <thead>
                    <tr>
                        <th>Naam</th>
                        <th>Role</th>
                        <th>Monthly Salary</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="staff-list"></tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadStaff() {
            const response = await fetch('/api/staff');
            const staffList = await response.json();
            const tbody = document.getElementById('staff-list');
            tbody.innerHTML = '';
            staffList.forEach(staff => {
                tbody.innerHTML += `
                    <tr>
                        <td>${staff.name}</td>
                        <td>
                            <span class="role-badge ${staff.role === 'Manager' ? 'manager' : 'worker'}">
                                ${staff.role}
                            </span>
                        </td>
                        <td>₹${staff.monthlySalary.toLocaleString()}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteStaff('${staff.id}')">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function addStaff() {
            const name = document.getElementById('name').value;
            const role = document.getElementById('role').value;
            const monthlySalary = document.getElementById('monthlySalary').value;

            if (!name || !role || !monthlySalary) {
                alert('Saari fields bharo!');
                return;
            }

            await fetch('/api/staff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, role, monthlySalary })
            });

            document.getElementById('name').value = '';
            document.getElementById('role').value = '';
            document.getElementById('monthlySalary').value = '';

            loadStaff();
        }

        async function deleteStaff(id) {
            if (confirm('Kya aap sure hain?')) {
                await fetch(`/api/staff/${id}`, { method: 'DELETE' });
                loadStaff();
            }
        }

        loadStaff();
    </script>
</body>
</html>
